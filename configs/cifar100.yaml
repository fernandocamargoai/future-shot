seed_everything: 42
trainer:
  max_epochs: 100
  precision: 16-mixed
  callbacks:
    - class_path: pytorch_lightning.callbacks.EarlyStopping
      init_args:
        monitor: val/loss
        patience: 3
        verbose: True
    - class_path: pytorch_lightning.callbacks.ModelCheckpoint
      init_args:
        monitor: val/loss
        verbose: True
  logger:
    - class_path: pytorch_lightning.loggers.wandb.WandbLogger
      init_args:
        project: future-shot-cifar100
        log_model: True

data:
  batch_size: 64
  dataset: cifar100
  num_workers: 0
  preprocessing_fn:
    class_path: future_shot.extra.timm.preprocessing.TimmFutureShotPreprocessing
    init_args:
      image_field: img
      transform:
        class_path: future_shot.extra.timm.preprocessing.TimmTransform
        init_args:
          input_size: [3, 32, 32]
  augmentation_fn:
    class_path: future_shot.extra.timm.preprocessing.TimmFutureShotAugmentation
    init_args:
      image_field: img
      transform:
        class_path: future_shot.extra.timm.preprocessing.TimmTransform
        init_args:
          input_size: [3, 32, 32]
          is_training: True
          auto_augment: rand-m9-mstd0.5
model:
  encoder:
    class_path: future_shot.extra.timm.model.TimmModel
    init_args:
      model_name: resnet50
  embedding_dim: 128
  num_classes: 100
  normalize_embeddings: True
  label_field: fine_label

optimizer:
  class_path: torch.optim.RAdam
  init_args:
    lr: 0.001

parameter_linking:
  model.encoder.init_args.model_name: data.preprocessing_fn.init_args.transform.init_args.model_name
  model.embedding_dim: model.encoder.init_args.dense_layer_dim